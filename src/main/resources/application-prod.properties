# ===================================
# Perfil de PRODUCCIÓN (prod)
# ===================================
# Para activarlo: --spring.profiles.active=prod
# o con variable de entorno: SPRING_PROFILES_ACTIVE=prod
#
# IMPORTANTE: Todas las variables sensibles deben configurarse como
# variables de entorno, nunca hardcodeadas aquí.

# Base de datos PostgreSQL
# Configurar estas variables de entorno antes de arrancar:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanagerdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Consola H2 desactivada en producción
spring.h2.console.enabled=false

# Hibernate mantiene el esquema existente sin borrarlo
spring.jpa.hibernate.ddl-auto=validate

# No mostrar SQL en logs de producción
spring.jpa.show-sql=false
