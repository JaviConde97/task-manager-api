# Nombre de la aplicación
spring.application.name=task-manager-api

# Perfil activo por defecto (cambiar a "prod" para producción)
spring.profiles.active=dev

# Configuración del servidor
server.port=8080

# JPA / Hibernate — configuración compartida entre perfiles
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
# En producción estos valores deben venir de variables de entorno, nunca del código fuente
jwt.secret=${JWT_SECRET:clave-secreta-muy-larga-que-debe-tener-al-menos-256-bits-para-HS256}
jwt.expiration=${JWT_EXPIRATION:86400000}
