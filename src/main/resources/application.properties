# Nombre de la aplicación
spring.application.name=task-manager-api

# Configuración del servidor
server.port=8080

# Configuración de H2 (base de datos en memoria para desarrollo)
spring.datasource.url=jdbc:h2:mem:taskmanagerdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT
jwt.secret=clave-secreta-muy-larga-que-debe-tener-al-menos-256-bits-para-HS256
jwt.expiration=86400000
