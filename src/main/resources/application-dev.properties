# ===================================
# Perfil de DESARROLLO (dev)
# ===================================
# Activo por defecto. Usa H2 en memoria — no requiere instalar nada.
# Los datos se pierden al reiniciar la aplicación.

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:taskmanagerdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 accesible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate recrea el esquema en cada arranque
spring.jpa.hibernate.ddl-auto=create-drop
